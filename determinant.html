<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pivot Point - Determináns</title>

  <script>
    window.MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$']] },
      svg: { fontCache: 'global' }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

  <link rel="stylesheet" href="css/styles.css" />

  <style>
    .matrix-grid {
      display: grid;
      gap: 10px;
      margin: 2rem auto;
      max-width: fit-content;
    }

    .matrix-cell {
      width: 60px;
      height: 60px;
      text-align: center;
      font-size: 1.2rem;
      border: 2px solid var(--color-bg-dark);
      border-radius: 8px;
      background: white;
    }

    .hidden {
      display: none;
    }

    .action-buttons {
      margin-top: 1.5rem;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .step-card {
      background: white;
      padding: 1.5rem;
      border-radius: 12px;
      margin-bottom: 1rem;
      border-left: 5px solid var(--color-primary);
      box-shadow: var(--shadow-soft);
    }

    .step-card-dark {
      background: var(--color-bg-dark);
      color: white;
    }
  </style>
</head>

<body>
  <header>
    <div class="nav-container">
      <a href="index.html" class="logo logo-link" aria-label="Vissza a főoldalra">
        <div class="logo-badge">P</div>
        <div>Pivot Point</div>
      </a>

      <div class="nav-links-wrapper">
        <a href="index.html" class="btn-nav-primary" style="text-decoration: none; display: inline-block;">
          Vissza a kezdőlapra
        </a>
      </div>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="section-card">
        <h1 class="section-title">Determináns számítás</h1>
        <p class="section-lead">
          Itt kétféleképpen számolhatod ki a determinánst:
          kifejtéssel vagy pivotálással.
        </p>

        <div id="determinant-app-container" class="app-container">
          <div class="control-panel">
            <div class="field-group field-group-inline">
              <label class="field-label">Méret (n×n)</label>
              <input type="number" id="matrix-size" value="3" min="2" max="4" class="input-sm" />
            </div>
            <button id="btn-create-grid" class="btn-main btn-primary">Létrehozás</button>
          </div>

          <div id="matrix-input-wrapper" class="matrix-input-wrapper hidden">
            <div id="matrix-grid" class="matrix-grid"></div>

            <div class="action-buttons">
              <button id="btn-fill-random" class="btn-main btn-secondary">Véletlen</button>
              <button id="btn-calc-det" class="btn-main btn-secondary">Kiszámítás kifejtéssel</button>
              <button id="btn-calc-det-pivot" class="btn-main btn-primary">Kiszámítás pivotálással</button>
            </div>
          </div>

          <div id="matrix-display-area" class="matrix-display-area hidden" style="margin-top: 2rem;">
            <div id="calc-steps"></div>

            <div class="generation-result" style="margin-top: 2rem; background: var(--color-primary); color: white; padding: 1.5rem; border-radius: 12px;">
              <div style="margin-bottom: 0.5rem;">
                Módszer: <strong id="result-method"></strong>
              </div>
              Végeredmény: $\det(A) = $ <strong id="final-result"></strong>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="js/determinant.js"></script>
</body>
</html>
